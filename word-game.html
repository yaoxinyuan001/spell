<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思单词拼拼乐 - IELTS Word Spelling Fun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F0; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .letter-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .letter-card:active { transform: scale(0.95); }
        @keyframes pulse-red {
            0%, 100% { color: #ef4444; }
            50% { color: #b91c1c; }
        }
        .animate-pulse-red { animation: pulse-red 1s infinite; }
    </style>
</head>
<body class="min-h-screen text-[#1A1A1A]">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-black/5 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <div>
                <p class="text-[10px] uppercase tracking-wider font-bold text-black/40">正确次数</p>
                <p id="score" class="text-lg font-bold leading-none">0</p>
            </div>
        </div>

        <div class="flex items-center gap-8">
            <div class="flex flex-col items-center">
                <p class="text-[10px] uppercase tracking-wider font-bold text-black/40">本题倒计时</p>
                <div id="timer-display" class="flex items-center gap-1.5 font-mono text-xl font-bold text-emerald-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>
                    <span id="countdown">30</span>s
                </div>
            </div>
            <div class="flex flex-col items-center">
                <p class="text-[10px] uppercase tracking-wider font-bold text-black/40">总用时</p>
                <div class="flex items-center gap-1.5 font-mono text-xl font-bold text-black/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span id="total-time">0:00</span>
                </div>
            </div>
        </div>

        <button onclick="resetGame()" class="p-2 hover:bg-black/5 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
    </header>

    <main class="pt-24 pb-12 px-6 max-w-2xl mx-auto">
        <!-- Start Screen -->
        <div id="start-screen" class="flex flex-col items-center text-center py-20">
            <div class="w-24 h-24 bg-emerald-100 rounded-3xl flex items-center justify-center text-emerald-600 mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
            <h1 class="text-4xl font-bold tracking-tight mb-4">雅思单词拼拼乐</h1>
            <p class="text-black/50 mb-12 max-w-md">通过有趣的拼写挑战掌握雅思核心词汇。每题30秒，你能答对多少个？</p>
            <button onclick="startGame()" class="group relative px-12 py-4 bg-[#1A1A1A] text-white rounded-2xl font-bold text-lg overflow-hidden transition-transform active:scale-95">
                <span class="relative z-10 flex items-center gap-2">开始挑战</span>
            </button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden space-y-8">
            <div class="bg-white rounded-[32px] p-8 shadow-xl shadow-black/5 border border-black/5 relative overflow-hidden">
                <div class="aspect-video w-full rounded-2xl bg-[#F9F9F7] mb-8 overflow-hidden relative">
                    <img id="word-image" src="" alt="word illustration" class="w-full h-full object-cover opacity-80 transition-transform duration-700">
                    <div id="word-category" class="absolute top-4 right-4 px-3 py-1 bg-white/90 backdrop-blur rounded-full text-[10px] font-bold uppercase tracking-widest text-black/40">CATEGORY</div>
                </div>

                <div class="text-center space-y-2">
                    <div class="flex items-center justify-center gap-3">
                        <span id="word-phonetic" class="text-black/30 font-mono text-lg">/phonetic/</span>
                        <button onclick="pronounceCurrentWord()" class="p-2 bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-100 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                    <h2 id="word-translation" class="text-3xl serif italic text-black/80">翻译</h2>
                </div>

                <!-- Feedback Overlay -->
                <div id="feedback-overlay" class="hidden absolute inset-0 z-10 flex items-center justify-center backdrop-blur-sm bg-white/40">
                    <div id="feedback-correct" class="hidden flex flex-col items-center text-emerald-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <p class="text-xl font-bold mt-2">太棒了!</p>
                    </div>
                    <div id="feedback-wrong" class="hidden flex flex-col items-center text-red-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        <p class="text-xl font-bold mt-2">再试一次</p>
                    </div>
                </div>
            </div>

            <!-- Blanks -->
            <div id="blanks-container" class="flex flex-wrap justify-center gap-2"></div>

            <!-- Letter Pool -->
            <div class="bg-white/50 backdrop-blur p-6 rounded-[24px] border border-black/5">
                <div id="letter-pool" class="flex flex-wrap justify-center gap-3"></div>
            </div>

            <!-- Controls -->
            <div class="flex justify-center gap-4">
                <button onclick="handleUndo()" class="flex items-center gap-2 px-6 py-3 bg-white rounded-2xl border border-black/5 font-bold text-black/60 hover:bg-black/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg> 撤回
                </button>
                <button onclick="initWord()" class="flex items-center gap-2 px-6 py-3 bg-white rounded-2xl border border-black/5 font-bold text-black/60 hover:bg-black/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> 重置
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center py-20">
            <div class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center text-white mx-auto mb-8 shadow-2xl shadow-emerald-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h2 class="text-4xl font-bold mb-2">挑战结束!</h2>
            <p class="text-black/40 mb-12">你今天已经掌握了一些核心雅思词汇。</p>
            
            <div class="grid grid-cols-2 gap-4 mb-12">
                <div class="bg-white p-6 rounded-3xl border border-black/5">
                    <p class="text-[10px] uppercase tracking-widest font-bold text-black/30 mb-1">正确数量</p>
                    <p id="final-score" class="text-3xl font-bold text-emerald-600">0</p>
                    <p class="text-xs text-black/40">单词</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-black/5">
                    <p class="text-[10px] uppercase tracking-widest font-bold text-black/30 mb-1">总用时</p>
                    <p id="final-time" class="text-3xl font-bold text-black/70">0:00</p>
                    <p class="text-xs text-black/40">学习时长</p>
                </div>
            </div>

            <button onclick="startGame()" class="px-12 py-4 bg-[#1A1A1A] text-white rounded-2xl font-bold text-lg hover:scale-105 transition-transform active:scale-95">
                再玩一次
            </button>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-6 flex justify-center pointer-events-none">
        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-black/10">IELTS Vocabulary Mastery</p>
    </footer>

    <script>
        const WORDS = [
            { word: "abandon", phonetic: "[əˈbændən]", translation: "放弃", category: "动作" },
            { word: "abstract", phonetic: "[ˈæbstrækt]", translation: "抽象的", category: "概念" },
            { word: "accumulate", phonetic: "[əˈkjuːmjəleɪt]", translation: "积累", category: "动作" },
            { word: "acknowledge", phonetic: "[əkˈnɒlɪdʒ]", translation: "承认", category: "动作" },
            { word: "acquire", phonetic: "[əˈkwaɪə(r)]", translation: "获得", category: "动作" },
            { word: "adequate", phonetic: "[ˈædɪkwət]", translation: "充足的", category: "品质" },
            { word: "adjacent", phonetic: "[əˈdʒeɪsnt]", translation: "邻近的", category: "位置" },
            { word: "advocate", phonetic: "[ˈædvəkeɪt]", translation: "提倡", category: "动作" },
            { word: "ambiguous", phonetic: "[æmˈbɪɡjuəs]", translation: "模棱两可的", category: "品质" },
            { word: "anticipate", phonetic: "[ænˈtɪsɪpeɪt]", translation: "预料", category: "动作" }
        ];

        let currentWordIndex = 0;
        let score = 0;
        let timeLeft = 30;
        let totalSeconds = 0;
        let userInput = [];
        let shuffledPool = [];
        let gameInterval, timerInterval;

        const SOUNDS = {
            correct: 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3',
            wrong: 'https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3',
            click: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'
        };

        function playSound(type) {
            new Audio(SOUNDS[type]).play().catch(() => {});
        }

        function pronounce(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function pronounceCurrentWord() {
            pronounce(WORDS[currentWordIndex].word);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            score = 0;
            totalSeconds = 0;
            currentWordIndex = 0;
            updateStats();
            initWord();
            startTimers();
        }

        function startTimers() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                totalSeconds++;
                document.getElementById('total-time').innerText = formatTime(totalSeconds);
            }, 1000);

            resetCountdown();
        }

        function resetCountdown() {
            clearInterval(gameInterval);
            timeLeft = 30;
            updateCountdownDisplay();
            gameInterval = setInterval(() => {
                timeLeft--;
                updateCountdownDisplay();
                if (timeLeft <= 0) {
                    nextWord();
                }
            }, 1000);
        }

        function updateCountdownDisplay() {
            const display = document.getElementById('countdown');
            const container = document.getElementById('timer-display');
            display.innerText = timeLeft;
            if (timeLeft <= 5) {
                container.classList.add('animate-pulse-red');
                container.classList.remove('text-emerald-600');
            } else {
                container.classList.remove('animate-pulse-red');
                container.classList.add('text-emerald-600');
            }
        }

        function initWord() {
            const wordObj = WORDS[currentWordIndex];
            userInput = [];
            shuffledPool = wordObj.word.split('').sort(() => Math.random() - 0.5);
            
            document.getElementById('word-image').src = `https://picsum.photos/seed/${wordObj.word}/800/450`;
            document.getElementById('word-category').innerText = wordObj.category;
            document.getElementById('word-phonetic').innerText = wordObj.phonetic;
            document.getElementById('word-translation').innerText = wordObj.translation;
            
            renderBlanks();
            renderPool();
            resetCountdown();
            setTimeout(() => pronounce(wordObj.word), 500);
        }

        function renderBlanks() {
            const container = document.getElementById('blanks-container');
            container.innerHTML = '';
            const word = WORDS[currentWordIndex].word;
            for (let i = 0; i < word.length; i++) {
                const blank = document.createElement('div');
                blank.className = `w-12 h-14 rounded-xl border-2 flex items-center justify-center text-2xl font-bold transition-all ${userInput[i] ? 'bg-white border-emerald-500 text-emerald-600 shadow-lg' : 'bg-black/5 border-transparent text-black/20'}`;
                blank.innerText = userInput[i] || '';
                container.appendChild(blank);
            }
        }

        function renderPool() {
            const container = document.getElementById('letter-pool');
            container.innerHTML = '';
            shuffledPool.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-12 h-12 bg-white rounded-xl shadow-sm border border-black/5 flex items-center justify-center text-xl font-bold hover:shadow-md hover:border-emerald-200 transition-all letter-card';
                btn.innerText = letter;
                btn.onclick = () => handleLetterClick(letter, index);
                container.appendChild(btn);
            });
        }

        function handleLetterClick(letter, index) {
            playSound('click');
            userInput.push(letter);
            shuffledPool.splice(index, 1);
            renderBlanks();
            renderPool();

            if (userInput.length === WORDS[currentWordIndex].word.length) {
                checkAnswer();
            }
        }

        function handleUndo() {
            if (userInput.length === 0) return;
            const last = userInput.pop();
            shuffledPool.push(last);
            shuffledPool.sort(() => Math.random() - 0.5);
            renderBlanks();
            renderPool();
        }

        function checkAnswer() {
            const isCorrect = userInput.join('') === WORDS[currentWordIndex].word;
            const overlay = document.getElementById('feedback-overlay');
            overlay.classList.remove('hidden');
            
            if (isCorrect) {
                score++;
                playSound('correct');
                document.getElementById('feedback-correct').classList.remove('hidden');
                pronounce(WORDS[currentWordIndex].word);
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.getElementById('feedback-correct').classList.add('hidden');
                    nextWord();
                }, 1500);
            } else {
                playSound('wrong');
                document.getElementById('feedback-wrong').classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.getElementById('feedback-wrong').classList.add('hidden');
                    initWord();
                }, 1000);
            }
            updateStats();
        }

        function nextWord() {
            currentWordIndex++;
            if (currentWordIndex < WORDS.length) {
                initWord();
            } else {
                showResults();
            }
        }

        function showResults() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-time').innerText = formatTime(totalSeconds);
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function resetGame() {
            if (confirm('确定要重新开始吗？')) {
                startGame();
            }
        }
    </script>
</body>
</html>
